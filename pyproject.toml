[tool.deptry]
# requirements.txt path is relative to the repo root (where deptry is invoked from)
requirements_files = ["ingest/requirements.txt"]

# Local modules: 'ingest' is the local package (ingest/__init__.py);
# 'check_freshness' is ingest/scripts/check_freshness.py, imported by rebuild_due.py
# via a same-directory relative import rather than a package path.
known_first_party = ["ingest", "check_freshness"]

# Several packages use a different PyPI name vs importable module name.
# Without this map deptry raises DEP001 ("missing") on the module name and
# DEP002 ("unused") on the package name simultaneously.
[tool.deptry.package_module_name_map]
"firecrawl-py"     = "firecrawl"
"python-dotenv"    = "dotenv"
"beautifulsoup4"   = "bs4"
"python-dateutil"  = "dateutil"
"pyyaml"           = "yaml"
"pymupdf"          = "fitz"

# psycopg2 ships as a transitive of psycopg[binary] and is imported directly in a
# few low-level DB helpers.  Suppress both DEP001 (missing) and DEP003 (transitive)
# — it's an intentional, stable transitive use.
# firecrawl: ingest/lib/firecrawl_client.py is DORMANT code. Firecrawl was removed by decree
# (2026-06-16 — crawl4ai is the only crawl tool); the lazy `import firecrawl` is gated on an
# unset FIRECRAWL_API_KEY and never fires, and firecrawl-py is intentionally NOT a dependency.
[tool.deptry.per_rule_ignores]
DEP001 = ["psycopg2", "firecrawl"]
DEP003 = ["psycopg2", "firecrawl"]

# Pytest discovery for the Python ingest suite. Scoped to ingest/ (all Python tests live
# there: ingest/tests/{lib,pipelines}, ingest/pipelines/*, ingest/duckdb_pipelines/*) so a
# bare `pytest` is reproducible and never wanders into node_modules. Added 2026-06-20 with
# the test-tree consolidation (check ingest_test_tree_consolidation) so these tests can gate.
[tool.pytest.ini_options]
testpaths = ["ingest"]
