    # pipeline_name="tier1_inventory" in pipeline.py — actual schema_name in _dlt_loads is fema_nfip_tier2.

  - name: leepa
    lane: tier-2
    cadence_days: 365
    tolerance_multiplier: 1.5
    dlt_schema_name: leepa_parcels_tier2
    # Verified: MAX(inserted_at) = 2026-05-18 ✓
    # pipeline_name="tier1_inventory" in pipeline.py — actual schema_name is leepa_parcels_tier2.

  - name: fhfa
    lane: tier-2
    cadence_days: 90
    tolerance_multiplier: 2.0
    dlt_schema_name: fhfa_hpi
    # Verified: MAX(inserted_at) = 2026-05-18 ✓
    # pipeline_name="fhfa_hpi" in pipeline.py matches _dlt_loads schema_name.

  - name: fdot
    lane: tier-2
    cadence_days: 365
    tolerance_multiplier: 1.5
    dlt_schema_name: fdot_aadt_tier2
    # Verified: MAX(inserted_at) = 2026-05-18 ✓
    # pipeline_name="tier1_inventory" in pipeline.py — actual schema_name is fdot_aadt_tier2.

  - name: lee_permits
    lane: tier-2
    cadence_days: 7
    tolerance_multiplier: 3.0
    dlt_schema_name: lee_permits
    # Verified: MAX(inserted_at) = 2026-05-25 ✓

  - name: collier_permits
    lane: tier-2
    cadence_days: 30
    tolerance_multiplier: 2.0
    dlt_schema_name: collier_permits
    # Verified: April 2026 XLSX loaded 2026-05-27 (operator-confirmed, pre-WAF window).

  - name: fl_dor_tdt
    lane: tier-2
    cadence_days: 30
    tolerance_multiplier: 2.5
    dlt_schema_name: fl_dor_tdt_collections
    # First run: 2026-05-28 backfill (FY1999-FY2026). Lee: 334 rows Jul 1998-Apr 2026.
    # Collier: 332 rows Jul 1998-Feb 2026 (~2 month lag vs Lee).
    # Cron: 20th of month 10:00 UTC via fl-dor-tdt-monthly.yml.
    # Note: pipeline uses FY-derived dates (not row 9 cell values) — FY1999/2001-2003
    # had 1900-era date serials in row 9 which required cleanup + _fix_bad_dates.py.

  - name: fl_dor_sales_tax
    lane: tier-2
    cadence_days: 30
    tolerance_multiplier: 2.0
    freshness_table: public.fl_dor_sales_tax
    # Non-dlt pipeline — freshness checked via MAX(inserted_at) on the table directly.
    # First run: 2026-05-29 backfill (cy0203–cy2425). 40,140 rows. Lee + Collier.
    # Cron: 15th of month 11:00 UTC via fl-dor-sales-tax-monthly.yml.

  - name: zori_swfl_tier2
    lane: tier-2
    cadence_days: 30
    tolerance_multiplier: 2.0
    dlt_schema_name: zori_swfl
    # Verified: MAX(inserted_at) = 2026-05-24 ✓
    # Separate from zori_swfl_duckdb; this is the Postgres promotion pipeline.

  - name: fgcu_reri_indicators
    lane: tier-2
    cadence_days: 30
    tolerance_multiplier: 2.0
    freshness_table: public.fgcu_reri_indicators
    # Non-dlt pipeline — freshness checked via MAX(inserted_at) on the table directly.
    # Source: FGCU RERI homepage (https://www.fgcu.edu/cob/reri/). Scrapes via Firecrawl.
    # 8 SWFL economic indicators per month: airport activity, tourist tax, taxable sales,
    # unemployment, building permits, home sales, home prices (per county), active listings.
    # Lee + Collier + Charlotte coverage. ~2-month data lag (e.g., May 2026 report → March data).
    # Cron: 5th of month 14:00 UTC via fgcu-reri-monthly.yml.
    # First run: 2026-05-29 (manual dispatch after SQL migration).

