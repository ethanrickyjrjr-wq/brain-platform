# Cadence registry for the daily freshness probe.
#
# Verified against live DB 2026-05-26. Each entry was confirmed with:
#   Tier-1: SELECT id, updated_at FROM data_lake._tier1_inventory WHERE id LIKE '<prefix>%' ...
#   Tier-2: SELECT schema_name, MAX(inserted_at) FROM data_lake._dlt_loads WHERE schema_name = '<name>' GROUP BY 1
#
# Schema per entry:
#   name:                  human-readable identifier (matches pipeline dir name)
#   lane:                  tier-1 | tier-1-duckdb | tier-2
#   cadence_days:          how often the SOURCE publishes (not how often we run)
#   tolerance_multiplier:  alert when age > cadence_days * tolerance; default 2.0
#
#   Tier-1 / tier-1-duckdb entries also require ONE of:
#     inventory_id + inventory_key_type: exact   # fixed path, overwritten each run
#     inventory_id + inventory_key_type: prefix  # date-partitioned; latest row wins
#   The probe queries data_lake._tier1_inventory.updated_at (always a proper timestamp).
#
#   Tier-2 entries also require:
#     dlt_schema_name:   the schema_name value in data_lake._dlt_loads
#
#   Non-dlt tier-2 entries may optionally set:
#     freshness_column:  the timestamp column to query MAX() on (default: inserted_at).
#                        Set when the table uses a different column, e.g. scraped_at or last_seen_at.
#
#   Volume guard fields (optional, any lane):
#     expected_rows_min: N   # floor row count; probe emits LOW_VOLUME (not STALE) when below
#     count_table: schema.table  # required for tier-2 dlt entries where dlt_schema_name
#                                # differs from the actual Postgres table name.
#                                # Falls back to freshness_table for non-dlt entries.
#                                # Tier-1 entries: volume check is skipped (no SQL table).
#
# Naming note: dlt_schema_name is the schema_name column in _dlt_loads, NOT the
# pipeline_name argument in pipeline.py (they sometimes differ — see verified values below).

