# Brand Tier Registry
#
# Classifies known brands by tier and category. Used by the event significance evaluator
# (lib/signals/event-evaluator.ts — Phase 4C) to score a QualEvent's raw impact weight.
#
# Tier definitions (Census Bureau retail + anchor-tenant theory):
#   Tier 1 — National Anchor (>10 states, box/hypermarket): weight_open 10, weight_close 10
#   Tier 2 — National Chain / QSR / Specialty (>10 states, inline size): weight_open 8, weight_close 7
#   Tier 3 — Regional Chain (2-10 states or strong regional footprint): weight_open 5, weight_close 4
#   Tier 4 — Local multi-location (1 state, >1 location): weight_open 2, weight_close 2
#   Tier 5 — Single-location independent: SILENT — weight_open 0, weight_close 0
#
# _unclassified: default for any brand not explicitly listed (tier 5 / silent).
# Maintainability: add entries as real event data surfaces. This is an allowlist — silence
# is the default, not the exception.
#
# aliases: alternate spellings that appear in permit/news data for brand-matching.
# category: general_merchandise | grocery | home_improvement | warehouse_club | qsr |
#           pharmacy | convenience | discount | fitness | healthcare | hotel | automotive |
#           banking | entertainment | education

_unclassified:
  tier: 5
  weight_open: 0
  weight_close: 0

