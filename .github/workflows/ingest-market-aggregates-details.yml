name: ingest-market-aggregates-details

# SteadyAPI Layer-B housing-market-details -> data_lake.market_details_swfl (market-temperature-swfl).
# ~57 calls/run (one per in-scope Lee+Collier ZIP). MONTHLY — realtor.com's ZIP-grain aggregates only
# refresh monthly, so weekly polling would re-fetch identical numbers. Provenance surfaced = realtor.com.
#
# CRON PARKED until steadyapi_sole_spine live-verify (runner-IP WAF proof + operator go). Until then this
# runs ONLY via workflow_dispatch, dry_run defaults TRUE (zero network, zero DB write). First live
# validation: dispatch dry_run=false and read the [budget] line (~57 housing-market-details calls).
#
# on:
#   schedule:
#     - cron: "0 13 4 * *"   # 4th of the month 13:00 UTC — monthly (matches realtor.com's ZIP cadence)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (zero network, zero DB write)"
        type: boolean
        default: true

jobs:
  ingest:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
      PHOTOS_API: ${{ secrets.PHOTOS_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run housing-market-details aggregate
        env:
          DRY_INPUT: ${{ inputs.dry_run }}
        run: |
          ARGS=(--resource details)
          if [ "$DRY_INPUT" = "true" ]; then ARGS+=(--dry-run); fi
          python -m ingest.pipelines.market_aggregates.pipeline "${ARGS[@]}"
