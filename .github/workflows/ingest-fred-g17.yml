name: fred-g17 monthly

on:
  schedule:
    # 0 13 17 * * — G.17 publishes ~16th; day 17 = 1-day buffer; clear of redfin/faf5 (day 15)
    # See docs/standards/pipeline-freshness.md §3
    - cron: "0 13 17 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip Storage upload"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run fred_g17 pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.fred_g17.pipeline --dry-run
          else
            python -m ingest.pipelines.fred_g17.pipeline
          fi
