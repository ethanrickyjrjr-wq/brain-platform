name: ingest-active-listings

# Active residential listings -> data_lake.active_listings_residential.
#
# STAGGERED (4 county crons, 3 h apart) — avoids tripping the source's sustained-burst 403
# throttle (~420+ requests). Each county is ~150 pages; staggered runs never accumulate.
#   09:00 UTC  Collier   (~2,292 listings)
#   12:00 UTC  Lee
#   15:00 UTC  Charlotte
#   18:00 UTC  Sarasota
# Glades/Hendry return ~0 and are not scheduled (harmless to skip; all-county workflow_dispatch
# still covers them).
#
# Runner IP proven WAF-clear for single-county (Collier, 116+ pages, 0×403, run 28254764976).
# Source URL is NOT in the repo: read from LISTINGS_SOURCE_BASE_URL secret.
# CRAWL4AI_PROXY wired (dormant until secret is set — activates for WAF escalation fallback).

on:
  schedule:
    - cron: "0 9 * * *"    # Collier
    - cron: "0 12 * * *"   # Lee
    - cron: "0 15 * * *"   # Charlotte
    - cron: "0 18 * * *"   # Sarasota
  workflow_dispatch:
    inputs:
      county:
        description: "Limit to one SWFL county, e.g. 'Collier' (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (extract only, no DB write)"
        type: boolean
        default: false

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30  # single-county runs take ~6-8 min; all-county workflow_dispatch ~25 min
    env:
      DATABASE_URL: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
      LISTINGS_SOURCE_BASE_URL: ${{ secrets.LISTINGS_SOURCE_BASE_URL }}
      # Residential proxy for WAF bypass. No-op when unset (runner-IP clear for single-county load).
      CRAWL4AI_PROXY: ${{ secrets.CRAWL4AI_PROXY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: crawl4ai preflight (advisory)
        continue-on-error: true
        run: crawl4ai-doctor

      - name: Resolve county
        id: resolve
        run: |
          case "${{ github.event.schedule }}" in
            "0 9 * * *")  echo "county=Collier"   >> "$GITHUB_OUTPUT" ;;
            "0 12 * * *") echo "county=Lee"        >> "$GITHUB_OUTPUT" ;;
            "0 15 * * *") echo "county=Charlotte"  >> "$GITHUB_OUTPUT" ;;
            "0 18 * * *") echo "county=Sarasota"   >> "$GITHUB_OUTPUT" ;;
            *)             echo "county=${{ inputs.county }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run active listings pipeline
        env:
          COUNTY_INPUT: ${{ steps.resolve.outputs.county }}
          DRY_INPUT: ${{ inputs.dry_run }}
        run: |
          ARGS=()
          if [ -n "$COUNTY_INPUT" ]; then ARGS+=(--county "$COUNTY_INPUT"); fi
          if [ "$DRY_INPUT" = "true" ]; then ARGS+=(--dry-run); fi
          python -m ingest.pipelines.active_listings.pipeline "${ARGS[@]}"

      - name: Healthchecks.io heartbeat
        if: always()
        run: |
          curl -fsS -m 10 --retry 3 \
            "https://hc-ping.com/${{ secrets.HEALTHCHECKS_PING_KEY }}/active-listings-daily?create=1" || true
