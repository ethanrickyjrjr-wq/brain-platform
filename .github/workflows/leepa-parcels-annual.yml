name: LeePA parcels annual

on:
  schedule:
    # 13:00 UTC = 9 AM ET on March 1st.
    # LeePA publishes the prior year's certified roll in early Q1; March 1 is
    # conservative enough to ensure the data is available.
    - cron: "0 13 1 3 *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run leepa pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: python -m ingest.pipelines.leepa.pipeline
