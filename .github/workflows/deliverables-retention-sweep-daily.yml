name: Deliverables retention sweep (daily)

on:
  schedule:
    # 09:15 UTC daily — a standalone minute slot (nothing else schedules at :15),
    # off the crowded top-of-hour and the 08:30 project-feed lane (pipeline-freshness
    # §3). This is a bounded DELETE of trashed rows past the 7-day window, not a fetch.
    - cron: "15 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — count + print what would be hard-deleted, write nothing"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run deliverables retention sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            bun scripts/deliverables/retention-sweep.mts --dry-run
          else
            bun scripts/deliverables/retention-sweep.mts
          fi
