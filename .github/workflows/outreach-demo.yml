# .github/workflows/outreach-demo.yml
name: Outreach Demo Cadence
on:
  # SCHEDULE COMMENTED until the cycle-1 zero-complaint gate opens (operator call,
  # scorecard: outreach_demo_funnel.complaints = 0). Before uncommenting:
  #   (1) outreach domain verified in Resend (SPF/DKIM/DMARC + List-Unsubscribe
  #       re-checked on a test send FROM that domain),
  #   (2) OUTREACH_FROM_* pointed at the separate outreach domain sender,
  #   (3) a dispatched DRY run read + approved.
  # NOTE: OUTREACH_DEMO_APPROVED is deliberately NOT provided by this workflow —
  # cycle-1 live sends stay operator-local (preview → approve → send). Even a live
  # cron run would refuse to send until that approval env is threaded on purpose.
  # schedule:
  #   - cron: "0 13 * * *" # 13:00 UTC daily (~9am ET) — the trial-track send hour
  workflow_dispatch:
    inputs:
      campaign:
        description: "Campaign id (outreach_recipients.campaign_id)"
        required: true
concurrency:
  group: outreach-demo
  cancel-in-progress: false
jobs:
  demo:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run demo cadence (DRY)
        env:
          # Hardcoded DRY on dispatch — cycle-1 live sends are operator-local only.
          DRY_RUN: "true"
          SITE_ORIGIN: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # assembleActivationReport reads the lake → the brains project creds.
          BRAINS_SUPABASE_URL: ${{ secrets.BRAINS_SUPABASE_URL }}
          BRAINS_SUPABASE_SERVICE_KEY: ${{ secrets.BRAINS_SUPABASE_SERVICE_KEY }}
          RESEND_AUDIENCES_KEY: ${{ secrets.RESEND_AUDIENCES_KEY }}
          OUTREACH_FROM_NAME: ${{ vars.OUTREACH_FROM_NAME || vars.DIGEST_SENDER_NAME }}
          OUTREACH_FROM_EMAIL: ${{ vars.OUTREACH_FROM_EMAIL || vars.DIGEST_SENDER_ADDRESS }}
          OUTREACH_POSTAL_ADDRESS: ${{ vars.OUTREACH_POSTAL_ADDRESS }}
          OUTREACH_DEMO_BATCH_LIMIT: ${{ vars.OUTREACH_DEMO_BATCH_LIMIT || '30' }}
        run: bun scripts/email/outreach-demo-run.mts --campaign "${{ github.event.inputs.campaign }}"
