name: Project-feed change detection (daily)

on:
  schedule:
    # 08:30 UTC daily — after the 06:00 UTC daily-rebuild (timeout 30m) has landed
    # its commit, so this job reads the freshest COMMITTED brains/*.md off the
    # checkout. 30-past is a standalone minute slot (nothing else schedules there),
    # avoiding the crowded top-of-hour 08:00 lane (pipeline-freshness.md §3).
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — detect + print every would-write row, write nothing"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run project-feed change detection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            bun scripts/project-feed/change-detection.mts --dry-run
          else
            bun scripts/project-feed/change-detection.mts
          fi
