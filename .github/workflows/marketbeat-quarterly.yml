name: MarketBeat SWFL quarterly

on:
  schedule:
    # 13:00 UTC = 9 AM ET on the 1st of Jan / Apr / Jul / Oct.
    - cron: "0 13 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — call Firecrawl + validate but skip Postgres + dispatch"
        required: false
        default: "false"

permissions:
  contents: read
  actions: write # required to dispatch daily-rebuild.yml on success

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run marketbeat_swfl pipeline
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          BRAINS_SUPABASE_URL: ${{ secrets.BRAINS_SUPABASE_URL }}
          BRAINS_SUPABASE_SERVICE_KEY: ${{ secrets.BRAINS_SUPABASE_SERVICE_KEY }}
          SUPABASE_PG_HOST: ${{ secrets.SUPABASE_PG_HOST }}
          SUPABASE_PG_PORT: ${{ secrets.SUPABASE_PG_PORT }}
          SUPABASE_PG_DB: ${{ secrets.SUPABASE_PG_DB }}
          SUPABASE_PG_USER: ${{ secrets.SUPABASE_PG_USER }}
          SUPABASE_PG_PASSWORD: ${{ secrets.SUPABASE_PG_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.marketbeat_swfl.pipeline --dry-run
          else
            python -m ingest.pipelines.marketbeat_swfl.pipeline
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"text\": \":rotating_light: *marketbeat-quarterly* failed.\\n• Run: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
