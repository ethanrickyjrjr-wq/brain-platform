name: MarketBeat SWFL quarterly

on:
  schedule:
    # 13:00 UTC = 9 AM ET on the 1st of Jan / Apr / Jul / Oct.
    - cron: "0 13 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — call Firecrawl + validate but skip Postgres + dispatch"
        required: false
        default: "false"

permissions:
  contents: read
  actions: write # required to dispatch daily-rebuild.yml on success

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run marketbeat_swfl pipeline
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SPIDER_API_KEY: ${{ secrets.SPIDER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.marketbeat_swfl.pipeline --dry-run
          else
            python -m ingest.pipelines.marketbeat_swfl.pipeline
          fi
