name: ingest-market-aggregates-histogram

# SteadyAPI Layer-B price-histogram -> data_lake.listing_price_histogram_swfl (price-distribution-swfl).
# ~2 calls/run (Lee + Collier county-scale). Provenance surfaced = realtor.com; access layer never named.
#
# GRADUATED 2026-07-01: 1 clean live dispatch so far (run 28495473103, dry_run=false, success) — thinner
# proof than listing_lifecycle's 2-run bar, so watch the first 1-2 scheduled fires before trusting it
# fully unattended. Cadence entry moved from `not_yet_running:` to `pipelines:` in ingest/cadence_registry.yaml
# in the same commit. Respects the engine on/off switch (vars.ENGINE_ENABLED) like every other cron.

on:
  schedule:
    - cron: "0 11 * * 1"   # Mondays 11:00 UTC — weekly (price-band inventory is list-side, moves weekly)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (zero network, zero DB write)"
        type: boolean
        default: true

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
      PHOTOS_API: ${{ secrets.PHOTOS_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run price-histogram aggregate
        env:
          DRY_INPUT: ${{ inputs.dry_run }}
        run: |
          ARGS=(--resource histogram)
          if [ "$DRY_INPUT" = "true" ]; then ARGS+=(--dry-run); fi
          python -m ingest.pipelines.market_aggregates.pipeline "${ARGS[@]}"
