name: SWFL business news ingest daily

on:
  schedule:
    - cron: "0 6 * * *"    # 6am UTC daily — Vercel cron scores articles at 7am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Install crawl4ai browser
        run: crawl4ai-setup

      - name: Run news ingest
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.news_swfl.pipeline --dry-run
          else
            python -m ingest.pipelines.news_swfl.pipeline
          fi
