name: DBPR SIRS Submissions — Monthly SWFL

on:
  schedule:
    # Monthly on the 1st, 07:00 UTC.
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r ingest/requirements.txt

      - name: Install crawl4ai browsers
        run: crawl4ai-setup

      - name: crawl4ai preflight (advisory)
        continue-on-error: true
        run: crawl4ai-doctor

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          # Datacenter-IP escape: the DBPR WAF drops GitHub runner IPs (page.goto times out),
          # so this cron is DISABLED and SIRS is pulled locally monthly. Wired and ready for
          # the day a residential proxy is provisioned — set the CRAWL4AI_PROXY secret + run
          # `gh workflow enable dbpr-sirs-monthly.yml`. Unset today -> qix.py goes direct.
          CRAWL4AI_PROXY: ${{ secrets.CRAWL4AI_PROXY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m ingest.pipelines.dbpr_sirs.pipeline $DRY_RUN_FLAG
