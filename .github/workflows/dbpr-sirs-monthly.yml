name: DBPR SIRS Submissions — Monthly SWFL

on:
  schedule:
    # Monthly on the 1st, 07:00 UTC. (Was "0 7 1-7 * 1" intending "first Monday",
    # but cron ORs day-of-month and day-of-week — so it fired ~10×/month: days
    # 1–7 PLUS every Monday — needlessly burning Firecrawl credits. SIRS is a
    # monthly positive-signal scrape; the specific weekday does not matter.)
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install -r ingest/requirements.txt

      - name: Run ingest
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m ingest.pipelines.dbpr_sirs.pipeline $DRY_RUN_FLAG
