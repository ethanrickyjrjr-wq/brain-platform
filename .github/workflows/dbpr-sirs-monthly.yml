name: DBPR SIRS Submissions — Monthly SWFL

on:
  schedule:
    # Monthly on the 1st, 07:00 UTC.
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    # Self-hosted runner on the operator's machine: its residential IP reaches the DBPR WAF
    # directly (GitHub datacenter IPs are silently dropped — page.goto times out). The
    # 'swfl-local' label scopes this job to that one runner. Keeps SIRS on GHA + the ops
    # dashboard (logs, retries, visibility) instead of an invisible local Task Scheduler job.
    runs-on: [self-hosted, swfl-local]
    timeout-minutes: 30
    env:
      # Dedicated uv-managed venv (Python 3.12.13) holding the SIRS deps. Pinned by absolute
      # path because the machine's default `python` drifts to a depless 3.14 (uv/pythoncore)
      # that can't even pip-install the deps (no 3.14 wheels for lxml/etc.), and the old
      # Programs\Python\Python312 lost its python.exe. This venv is provisioned ONCE, outside
      # the repo, so it's stable across checkouts and reboots. To refresh after a
      # requirements.txt change:
      #   uv pip install --python "C:\Users\ethan\sirs-runner-venv\Scripts\python.exe" -r ingest/requirements.txt
      #   "C:\Users\ethan\sirs-runner-venv\Scripts\python.exe" -m playwright install chromium
      VENV_PY: 'C:\Users\ethan\sirs-runner-venv\Scripts\python.exe'
    defaults:
      run:
        # PowerShell on the Windows runner — bash hit a Windows app-execution-alias/WSL stub.
        shell: pwsh

    steps:
      - uses: actions/checkout@v6

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          # Runs on the self-hosted 'swfl-local' runner (residential IP), so it reaches the
          # DBPR WAF directly and CRAWL4AI_PROXY stays unset -> qix.py goes direct. Kept wired
          # as a fallback: if this ever moves back to a cloud runner, set the secret to escape
          # the datacenter-IP block without touching code.
          CRAWL4AI_PROXY: ${{ secrets.CRAWL4AI_PROXY }}
        run: |
          $pyArgs = @()
          if ("${{ github.event.inputs.dry_run }}" -eq "true") { $pyArgs += "--dry-run" }
          & "$env:VENV_PY" -m ingest.pipelines.dbpr_sirs.pipeline @pyArgs
