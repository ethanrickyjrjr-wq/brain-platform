# Grade Predictions — Phase 2 of the flywheel (Goal 9).
#
# CADENCE CONTRACT: there is no cron here by design. The grader drains a queue that
# only changes when master refines, so it runs as a downstream of "Daily Brain
# Rebuild" (workflow_run / completed, success-gated). The rebuild IS the schedule.
# Manual runs (incl. a no-write dry run) are available via workflow_dispatch.
#
# What it does: bun refinery/grade/grade-predictions.mts banks a deterministic
# machine verdict for every prediction whose window has closed and whose metric
# observation has landed. Zero LLM. Idempotent (one machine outcome per prediction).
# An empty queue is a SUCCESS (exit 0); only a Supabase/RPC error fails the run.

name: Grade Predictions

on:
  workflow_run:
    workflows: ["Daily Brain Rebuild"] # exact name — .github/workflows/daily-rebuild.yml
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (compute verdicts, write nothing)"
        type: boolean
        default: false

jobs:
  grade:
    # Only after a SUCCESSFUL rebuild, or any manual dispatch.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Grade predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: bun refinery/grade/grade-predictions.mts ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      # §6-A liveness: alert if per-slug leaf prediction logging stalls. WARN-ONLY
      # by design — it must never redden the grader (the loop is young and the
      # non-overlap cadence guard means max(refined_at) can legitimately not advance
      # for a day or two). A stall emits a GitHub annotation; graduate to a blocking
      # gate / ops tile once SLUG_STALL_DAYS stops flapping against observed cadence.
      - name: Slug-logging watchdog (warn-only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLUG_STALL_DAYS: "2"
        run: |
          set +e
          out=$(node scripts/check-slug-logging-freshness.mjs 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -eq 1 ]; then echo "::warning title=slug logging stalled::$out"; fi
          if [ "$code" -eq 2 ]; then echo "::warning title=slug-watchdog could not run::$out"; fi
          exit 0
