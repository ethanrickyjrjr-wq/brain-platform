name: Smoke — Prod

# Fires when Vercel's GitHub integration marks a deployment as success.
# No polling — Vercel tells us when it's READY.
on:
  deployment_status:

# One smoke run at a time — cancel if a newer deployment finishes first.
concurrency:
  group: smoke-prod-${{ github.event.deployment.environment }}-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Only run for successful Production deployments (not Preview, not failure).
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: bun scripts/smoke-prod.mts --base https://www.swfldatagulf.com
