name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint .

      - name: Test
        run: bun test

      # node:test files under .github/scripts (the cron-failure classifier + the
      # trigger-list drift guard). `bun test` does NOT discover these — bun ignores
      # dot-dirs and these are node:test, not bun:test — so they need their own step
      # or they ship unenforced.
      - name: Test .github scripts (node:test)
        run: node --test .github/scripts/*.test.mjs
