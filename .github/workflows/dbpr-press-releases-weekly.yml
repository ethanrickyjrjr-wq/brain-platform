name: DBPR Press Releases weekly

on:
  schedule:
    # 09:00 UTC Monday — clear of swfl-inc-weekly (08:00 UTC Monday).
    # DBPR publishes a handful of press releases per month; pages 1-2 covers any week.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill all 30 pages (one-time historical run)"
        required: false
        default: "false"
      dry_run:
        description: "Dry run — parse and print rows without writing to DB or storage"
        required: false
        default: "false"
      enrich_only:
        description: "Skip scraping; only run Sonnet enrichment on un-enriched rows"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run dbpr_press_releases pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          else
            FLAGS=""
          fi
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            FLAGS="$FLAGS --backfill"
          fi
          if [ "${{ github.event.inputs.enrich_only }}" = "true" ]; then
            FLAGS="$FLAGS --enrich-only"
          fi
          python -m ingest.pipelines.dbpr_press_releases.pipeline $FLAGS
