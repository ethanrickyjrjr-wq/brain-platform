name: FL DOR sales tax monthly

on:
  schedule:
    # 11:00 UTC = 7 AM ET on the 15th of each month.
    # FL DOR Form 10 gains new months with ~45-day lag. 15th avoids collision with TDT (20th).
    - cron: "0 11 15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — parse and print rows without writing to DB"
        required: false
        default: "false"
      year_pair:
        description: "Specific year pair to ingest, e.g. '2024 2025'. Blank = current + prior."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run fl_dor_sales_tax pipeline
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA="--dry-run"
          else
            EXTRA=""
          fi

          if [ -n "${{ github.event.inputs.year_pair }}" ]; then
            python -m ingest.pipelines.fl_dor_sales_tax.pipeline \
              --year-pair ${{ github.event.inputs.year_pair }} $EXTRA
          else
            python -m ingest.pipelines.fl_dor_sales_tax.pipeline --current $EXTRA
          fi
