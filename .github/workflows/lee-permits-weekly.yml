name: Lee County permits weekly

on:
  schedule:
    - cron: "0 11 * * 1"   # 11:00 UTC = 7:00 AM ET Mondays; rolling Mon→Mon window
  # Gates cleared 2026-06-16: crawl4ai_accela_gha_ip CLOSED (run 27602909470) +
  # lee_permits_first_lake_ingestion CLOSED (run 27624394217, 94 rows, 100% 33xxx ZIPs).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip dlt write (use for the GHA-IP probe)"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Pinned to 3.12 to match the locally-proven crawl4ai 0.8.9 env.
          python-version: "3.12"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Install Chromium for crawl4ai
        # UndetectedAdapter drives patchright (browser_manager.py: from patchright.async_api
        # import async_playwright), so patchright's own browser is required. playwright
        # --with-deps installs the shared OS libraries Chromium needs on the runner.
        run: |
          python -m playwright install --with-deps chromium
          python -m patchright install chromium

      - name: Run Lee permits pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          START=$(date -u -d "7 days ago" +%Y-%m-%d)
          END=$(date -u +%Y-%m-%d)
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            python -m ingest.pipelines.lee_permits.pipeline --start "$START" --end "$END"
          else
            python -m ingest.pipelines.lee_permits.pipeline --start "$START" --end "$END" --dry-run
          fi
