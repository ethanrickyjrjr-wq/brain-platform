name: Census CBP annual

on:
  schedule:
    # 13:00 UTC = 9 AM ET on January 15th.
    # CBP data for the prior year typically releases in spring; Jan 15 catches
    # the release window and re-runs are idempotent (merge write disposition).
    - cron: "0 13 15 1 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run census_cbp pipeline
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.census_cbp.pipeline --dry-run
          else
            python -m ingest.pipelines.census_cbp.pipeline
          fi
