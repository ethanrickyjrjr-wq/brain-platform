name: BLS LAUS monthly

on:
  schedule:
    # 12:00 UTC = 8 AM ET on the 4th of each month.
    # (Avoids clash with marketbeat-1st, corridor-narratives-2nd, county-pdfs-3rd.)
    - cron: "0 12 4 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run bls_laus pipeline
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: python -m ingest.pipelines.bls_laus.pipeline
