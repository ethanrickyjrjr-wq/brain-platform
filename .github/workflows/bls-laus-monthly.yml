name: BLS LAUS monthly

on:
  schedule:
    # 13:00 UTC = 9 AM ET on the 25th of each month.
    # BLS LAUS state-level series for reference month M releases ~3rd-4th week of M+1
    # (e.g. May 2026 ref month → June 23, 2026 release per bls.gov/schedule/news_release/laus.htm).
    # Day 25 buys ~5 days of buffer after the typical release. The prior cron was day 4 —
    # which fired ~3 weeks BEFORE the new month's data existed, so every pull was always
    # one cycle stale relative to publisher.
    # (Avoids clash with existing slots — see docs/standards/pipeline-freshness.md §3.)
    - cron: "0 13 25 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run bls_laus pipeline
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.bls_laus.pipeline --dry-run
          else
            python -m ingest.pipelines.bls_laus.pipeline
          fi
