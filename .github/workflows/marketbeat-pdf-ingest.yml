name: marketbeat-pdf-ingest

on:
  schedule:
    # Quarterly: 15th of Jan/Apr/Jul/Oct — one month after each quarter ends.
    # Reports typically publish within 2-3 weeks of quarter close.
    - cron: "0 10 15 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      quarter:
        description: "Quarter to process, e.g. 2025-Q4 (leave blank to auto-detect)"
        required: false
        default: ""
      from_downloads:
        description: "Process PDFs from the drop folder committed to the repo"
        type: boolean
        default: false
      dry_run:
        description: "Dry-run (extract + print, no DB write)"
        type: boolean
        default: false

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MARKETBEAT_DB_URL: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Determine target quarter
        id: quarter
        run: |
          if [ -n "${{ inputs.quarter }}" ]; then
            echo "value=${{ inputs.quarter }}" >> "$GITHUB_OUTPUT"
          else
            MONTH=$(date +%-m)
            YEAR=$(date +%Y)
            PREV=$((MONTH - 1))
            if [ "$PREV" -eq 0 ]; then
              PREV=12
              YEAR=$((YEAR - 1))
            fi
            echo "value=${YEAR}-Q$(( (PREV - 1) / 3 + 1 ))" >> "$GITHUB_OUTPUT"
          fi

      - name: Try auto-download Colliers PDF
        id: colliers_dl
        continue-on-error: true
        run: |
          mkdir -p ingest/drops/marketbeat_pdf
          python3 .github/scripts/download-colliers.py "${{ steps.quarter.outputs.value }}"

      - name: Try auto-download C&W PDF
        id: cw_dl
        continue-on-error: true
        run: |
          python3 .github/scripts/download-cw.py "${{ steps.quarter.outputs.value }}"

      - name: Process drop folder PDFs
        id: process
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python -m ingest.pipelines.marketbeat_pdf.pipeline $DRY_FLAG

      - name: Create issue if manual download needed
        if: >
          steps.colliers_dl.outputs.colliers_ok == 'false' ||
          steps.cw_dl.outputs.cw_ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const quarter = "${{ steps.quarter.outputs.value }}";
            const colliersOk = "${{ steps.colliers_dl.outputs.colliers_ok }}" === "true";
            const cwOk = "${{ steps.cw_dl.outputs.cw_ok }}" === "true";
            const missing = [];
            if (!colliersOk) missing.push(`**Colliers International** SWFL Industrial ${quarter}`);
            if (!cwOk) missing.push(`**C&W MarketBeat** SWFL Industrial ${quarter}`);
            const body = [
              `## MarketBeat PDF manual drop needed — ${quarter}`,
              "",
              "The scheduled ingest could not auto-download the following reports:",
              ...missing.map(s => `- ${s}`),
              "",
              "### Steps to manually drop:",
              "1. Download the PDF(s) from the broker website",
              "2. Rename to the convention:",
              "   - C&W: `MarketBeat_Industrial_Q${quarter.replace('-','').replace('Q','')}_FortMyers_Naples.pdf`",
              "   - Colliers: `Colliers_Industrial_Q${quarter.replace('-','').replace('Q','')}_SWFL.pdf`",
              "3. Copy to `ingest/drops/marketbeat_pdf/`",
              "4. Run `python -m ingest.pipelines.marketbeat_pdf.pipeline` locally, or",
              "   trigger **workflow_dispatch** → `marketbeat-pdf-ingest` with no inputs",
              "",
              "_This is an ODD (Operation Dumbo Drop) manual graduation — zero code changes needed._",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ODD] MarketBeat PDF manual drop needed: ${quarter}`,
              body,
              labels: ["odd-manual-drop", "data-ingest"],
            });
