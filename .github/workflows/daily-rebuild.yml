name: Daily Brain Rebuild

on:
  schedule:
    # 6 AM UTC daily (2 AM ET / 1 AM CT)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      pack_id:
        description: "Pack to rebuild (default: master runs full cascade)"
        required: false
        default: "master"
      force:
        description: "Force rebuild even if fresh (true/false)"
        required: false
        default: "false"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run refinery
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          PACK="${{ github.event.inputs.pack_id || 'master' }}"
          FORCE_FLAG="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          echo "Rebuilding pack: $PACK $FORCE_FLAG"
          bun refinery/cli.mts $PACK $FORCE_FLAG

      - name: Commit updated brains
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brains/
          if git diff --staged --quiet; then
            echo "No brain files changed — all fresh, nothing to commit."
          else
            git commit -m "chore(brains): daily rebuild $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { GITHUB_RUN_ID, GITHUB_REPOSITORY } = process.env;
            const runUrl = `https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}`;
            core.warning(`Daily rebuild failed. Check: ${runUrl}`);
