name: Daily Brain Rebuild

on:
  # Re-armed 2026-06-20 after the credit freeze. Gated by the ENGINE_ENABLED
  # repo variable (job-level if:) — flip with `node scripts/engine.mjs off|on`.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      pack_id:
        description: "Pack to rebuild (default: master runs full cascade)"
        required: false
        default: "master"
      force:
        description: "Force rebuild even if fresh (true/false)"
        required: false
        default: "false"

# Serialize rebuilds so overlapping runs (a manual dispatch landing while a
# scheduled run is mid-build, or several dispatches stacked up) can't race each
# other's push. The in-flight run finishes; the next queues behind it.
concurrency:
  group: daily-brain-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Python (for rebuild gate)
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r ingest/requirements.txt

      - name: Decide whether a rebuild is due
        id: gate
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force flag set — skipping gate, rebuild unconditionally."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif python ingest/scripts/rebuild_due.py; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      # Layer-2 silent-freeze watchdog (part 1/2): snapshot master's pre-run
      # refined_at + the run-start instant BEFORE the rebuild. This MUST happen
      # up front — the post-run "Commit updated brains" step rewrites HEAD, so the
      # pre-run value is unrecoverable afterward. Read from HEAD (the committed
      # copy cli.mts's brainStatus also sees at run start), not the working tree.
      - name: Capture master freshness baseline
        id: capture
        if: steps.gate.outputs.run == 'true'
        run: |
          RUN_STARTED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "run_started_at=$RUN_STARTED" >> "$GITHUB_OUTPUT"
          if git cat-file -e HEAD:brains/master.md 2>/dev/null; then
            BEFORE="$(git show HEAD:brains/master.md | grep -m1 '^refined_at:' | sed 's/^refined_at:[[:space:]]*//' || true)"
            if [ -z "$BEFORE" ]; then
              # master.md exists at HEAD but yields no refined_at → frontmatter drift.
              # Fail rather than emit an empty baseline that would make the freeze
              # watchdog treat this as a "cold start" and silently disarm itself.
              echo "::error::brains/master.md exists at HEAD but has no parseable refined_at — frontmatter drift. Failing instead of silently disarming the freeze watchdog." >&2
              exit 1
            fi
            echo "master_refined_at_before=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "Baseline: master refined_at=$BEFORE (HEAD), run started $RUN_STARTED"
          else
            # Genuine cold start — no master.md committed yet. Empty baseline is
            # correct here; the watchdog treats null-before as out-of-scope.
            echo "master_refined_at_before=" >> "$GITHUB_OUTPUT"
            echo "Baseline: no master.md at HEAD (cold start), run started $RUN_STARTED"
          fi

      - name: Run refinery (resilient)
        id: rebuild
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          SUPABASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
        run: |
          PACK="${{ github.event.inputs.pack_id || 'master' }}"
          FORCE_FLAG="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          echo "Rebuilding pack: $PACK $FORCE_FLAG (resilient)"
          # Default shell is `bash -eo pipefail`; without `set +e` a non-zero
          # bun exit aborts the step before we can capture it, and every
          # downstream step gated on exit_code silently no-ops. Capture, don't crash.
          set +e
          bun refinery/cli.mts $PACK $FORCE_FLAG --resilient
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Summarize build result
        if: steps.rebuild.outputs.exit_code != ''
        run: |
          EXIT="${{ steps.rebuild.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            echo "### ✅ Brain rebuild: clean" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$EXIT" = "2" ]; then
            echo "### ⚠️ Brain rebuild: degraded-but-complete" >> "$GITHUB_STEP_SUMMARY"
            echo "At least one upstream is serving last-good data. See brains/_build-report.json." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Brain rebuild: HELD or DETERMINISTIC FAILURE (exit $EXIT)" >> "$GITHUB_STEP_SUMMARY"
            echo "A critical upstream is missing/ineligible, OR a brain failed deterministically (orphan-concept, spec-validator, type error — a real defect that will not self-heal). Prior master.md is still serving. See brains/_build-report.json (look for failureClass: deterministic)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated brains
        if: steps.gate.outputs.run == 'true' && steps.rebuild.outputs.exit_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brains/
          if git diff --staged --quiet; then
            echo "No brain files changed — all fresh, nothing to commit."
          else
            git commit -m "chore(brains): daily rebuild $(date -u '+%Y-%m-%d')"
            for attempt in 1 2 3; do
              git fetch origin
              # --autostash: a full master cascade regenerates tracked fixtures/
              # (sidecarProducer, 4-output.mts:659) that `git add brains/` does
              # NOT stage. Without autostash, `git rebase` aborts with "cannot
              # rebase: You have unstaged changes" the moment origin advances
              # mid-run (e.g. an operator push landing during the build) — the
              # exact failure that sank run 26868740782. safe-push.mjs does this
              # via an explicit stash→rebase→pop; here we lean on autostash.
              git rebase --autostash origin/main
              if git push; then
                echo "Push succeeded on attempt $attempt."
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts — giving up."
                exit 1
              fi
              echo "Push rejected — another commit landed first; retrying (attempt $attempt/3)..."
            done
          fi

      # Runner-kill sentinel (issue: phase7_runner_kill_sentinel).
      # `continue-on-error: true` above is load-bearing — it lets a captured
      # bun-level non-zero (exit 1/2) reach the commit/gate steps instead of
      # aborting the job. But it ALSO downgrades a runner OOM / timeout-minutes
      # kill from red to a warning: the process dies before L87's `echo
      # exit_code=$?` runs, so `exit_code` is empty, every gate keyed on
      # `!= ''` silently no-ops, and the job concludes GREEN on a dead step.
      # (A Stage-3 Anthropic synthesis hang tripping timeout-minutes lands here.)
      #
      # You can't make the echo more robust — the process is already dead. Key
      # the sentinel off the signal GHA records independently of our shell:
      # `steps.rebuild.outcome` is the TRUE result captured BEFORE
      # continue-on-error rewrites it (use `outcome`, NOT `conclusion` — the
      # latter is rewritten to `success`). `!= 'success'` is deliberately broad
      # so it catches both `failure` and `cancelled`, whichever label a
      # process-kill produces. `always()` ensures it runs even after the kill;
      # the `run == 'true'` guard excludes the legitimately-skipped case.
      # A normal HOLD leaves the step `success` (the echo runs), so this fires
      # only on a genuinely dead step.
      - name: Fail job if rebuild step died (runner kill)
        if: always() && steps.gate.outputs.run == 'true' && steps.rebuild.outcome != 'success'
        run: |
          echo "Rebuild step did not complete (outcome=${{ steps.rebuild.outcome }}, exit_code='${{ steps.rebuild.outputs.exit_code }}')." >&2
          echo "Likely a runner OOM or timeout-minutes kill. Prior master.md still serving. Failing loudly instead of concluding GREEN on a dead step." >&2
          exit 1

      # Position matters: this sits BEFORE "Notify on failure" so that a hard
      # HOLD/crash (exit 1, not exit 2) flips the job to failed at this point,
      # which is what makes the `if: failure()` notify step below fire. Exit 2
      # (degraded-but-complete — master published) stays green and quiet.
      - name: Fail job on hard HOLD
        if: steps.rebuild.outputs.exit_code != '0' && steps.rebuild.outputs.exit_code != '2' && steps.rebuild.outputs.exit_code != ''
        run: |
          echo "Master HELD, a deterministic build failure occurred, or the run crashed (exit ${{ steps.rebuild.outputs.exit_code }}). Prior master.md still serving."
          exit 1

      # Layer-2 silent-freeze watchdog (part 2/2): an INDEPENDENT process that
      # cross-checks the build's success claim against the actual master.md on
      # disk. Catches the residual silent-freeze paths exit-code classification
      # can miss (e.g. a green run that reports master 'built'/'skipped-fresh'
      # yet master.md never advanced despite being due). Only runs on a green
      # rebuild that actually executed — exit 1 is already loud (the step above),
      # a skipped gate means nothing was attempted. Pure decision is unit-tested
      # in refinery/lib/master-freeze-watchdog.test.mts.
      - name: Watchdog - fail on silent master freeze
        if: steps.gate.outputs.run == 'true' && steps.rebuild.outputs.exit_code != ''
        env:
          WATCHDOG_GATE_RAN: ${{ steps.gate.outputs.run }}
          WATCHDOG_EXIT_CODE: ${{ steps.rebuild.outputs.exit_code }}
          WATCHDOG_MASTER_REFINED_BEFORE: ${{ steps.capture.outputs.master_refined_at_before }}
          WATCHDOG_RUN_STARTED_AT: ${{ steps.capture.outputs.run_started_at }}
        run: bun refinery/tools/check-master-freeze.mts

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const { GITHUB_RUN_ID, GITHUB_REPOSITORY } = process.env;
            const runUrl = `https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}`;
            core.warning(`Daily rebuild failed. Check: ${runUrl}`);
