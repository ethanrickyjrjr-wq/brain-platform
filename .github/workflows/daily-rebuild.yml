name: Daily Brain Rebuild

on:
  schedule:
    # 6 AM UTC daily (2 AM ET / 1 AM CT)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      pack_id:
        description: "Pack to rebuild (default: master runs full cascade)"
        required: false
        default: "master"
      force:
        description: "Force rebuild even if fresh (true/false)"
        required: false
        default: "false"

# Serialize rebuilds so overlapping runs (a manual dispatch landing while a
# scheduled run is mid-build, or several dispatches stacked up) can't race each
# other's push. The in-flight run finishes; the next queues behind it.
concurrency:
  group: daily-brain-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Python (for rebuild gate)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r ingest/requirements.txt

      - name: Decide whether a rebuild is due
        id: gate
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force flag set — skipping gate, rebuild unconditionally."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif python ingest/scripts/rebuild_due.py; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run refinery (resilient)
        id: rebuild
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          SUPABASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
        run: |
          PACK="${{ github.event.inputs.pack_id || 'master' }}"
          FORCE_FLAG="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          echo "Rebuilding pack: $PACK $FORCE_FLAG (resilient)"
          # Default shell is `bash -eo pipefail`; without `set +e` a non-zero
          # bun exit aborts the step before we can capture it, and every
          # downstream step gated on exit_code silently no-ops. Capture, don't crash.
          set +e
          bun refinery/cli.mts $PACK $FORCE_FLAG --resilient
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Summarize build result
        if: steps.rebuild.outputs.exit_code != ''
        run: |
          EXIT="${{ steps.rebuild.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            echo "### ✅ Brain rebuild: clean" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$EXIT" = "2" ]; then
            echo "### ⚠️ Brain rebuild: degraded-but-complete" >> "$GITHUB_STEP_SUMMARY"
            echo "At least one upstream is serving last-good data. See brains/_build-report.json." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Brain rebuild: MASTER HELD (exit $EXIT)" >> "$GITHUB_STEP_SUMMARY"
            echo "A critical upstream is missing or ineligible. Prior master.md is still serving." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated brains
        if: steps.gate.outputs.run == 'true' && steps.rebuild.outputs.exit_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brains/
          if git diff --staged --quiet; then
            echo "No brain files changed — all fresh, nothing to commit."
          else
            git commit -m "chore(brains): daily rebuild $(date -u '+%Y-%m-%d')"
            for attempt in 1 2 3; do
              git fetch origin
              git rebase origin/main
              if git push; then
                echo "Push succeeded on attempt $attempt."
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts — giving up."
                exit 1
              fi
              echo "Push rejected — another commit landed first; retrying (attempt $attempt/3)..."
            done
          fi

      # Position matters: this sits BEFORE "Notify on failure" so that a hard
      # HOLD/crash (exit 1, not exit 2) flips the job to failed at this point,
      # which is what makes the `if: failure()` notify step below fire. Exit 2
      # (degraded-but-complete — master published) stays green and quiet.
      - name: Fail job on hard HOLD
        if: steps.rebuild.outputs.exit_code != '0' && steps.rebuild.outputs.exit_code != '2' && steps.rebuild.outputs.exit_code != ''
        run: |
          echo "Master HELD or crashed (exit ${{ steps.rebuild.outputs.exit_code }}). Prior master.md still serving."
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const { GITHUB_RUN_ID, GITHUB_REPOSITORY } = process.env;
            const runUrl = `https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}`;
            core.warning(`Daily rebuild failed. Check: ${runUrl}`);
