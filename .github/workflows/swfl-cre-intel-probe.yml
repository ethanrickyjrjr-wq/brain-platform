name: SWFL CRE intelligence probe (one-shot)

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Tier to run (1=CW PDFs, 2=Colliers HTML, 3=editorial, blank=all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run probe
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SPIDER_API_KEY: ${{ secrets.SPIDER_API_KEY }}
        run: |
          TIER_ARG=""
          if [ -n "${{ github.event.inputs.tier }}" ]; then
            TIER_ARG="--tier ${{ github.event.inputs.tier }}"
          fi
          python scripts/swfl_cre_intel_probe.py $TIER_ARG --out cre-intel-results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cre-intel-results
          path: cre-intel-results.json
          retention-days: 14
