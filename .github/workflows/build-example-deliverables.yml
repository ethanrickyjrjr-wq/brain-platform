name: Rebuild Example Deliverables

on:
  schedule:
    # 8 AM UTC daily — after the 6 AM Daily Brain Rebuild refreshes brains/*.md, so the
    # examples carry the current freshness_token (matching live /r/*).
    - cron: "0 8 * * *"
  workflow_dispatch:

# Serialize so a manual dispatch can't race a scheduled run's upserts.
concurrency:
  group: build-example-deliverables
  cancel-in-progress: false

jobs:
  rebuild-examples:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild example deliverables
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: bun run scripts/build-example-deliverables.mts
