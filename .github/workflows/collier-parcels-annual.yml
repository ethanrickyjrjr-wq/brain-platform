name: Collier parcels annual (FDOR cadastral)

on:
  schedule:
    # FDOR Statewide Cadastral refreshes annually (~August). The dlt merge is
    # idempotent, so a monthly run is a harmless no-op until the new roll lands —
    # this catches the August refresh without a once-a-year single point of failure.
    - cron: "0 12 20 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch + normalize only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run Collier parcels pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python -m ingest.pipelines.collier_parcels.pipeline $ARGS
